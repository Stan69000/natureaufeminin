name: Deploy to O2Switch

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - sanity_content_updated
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: parallel
        type: choice
        options:
          - parallel
          - production

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PRODUCTION_SERVER_DIR: /naturaufeminin.fr/
  PARALLEL_SERVER_DIR: /

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    outputs:
      deploy_target: ${{ steps.meta.outputs.deploy_target }}
      deploy_env_name: ${{ steps.meta.outputs.deploy_env_name }}
      deploy_env_url: ${{ steps.meta.outputs.deploy_env_url }}
      server_dir: ${{ steps.meta.outputs.server_dir }}

    steps:
      - name: Resolve deployment target
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.action }}" = "sanity_content_updated" ]; then
            echo "deploy_target=production" >> "$GITHUB_OUTPUT"
            echo "deploy_env_name=production" >> "$GITHUB_OUTPUT"
            echo "deploy_env_url=https://naturaufeminin.fr" >> "$GITHUB_OUTPUT"
            echo "server_dir=${{ env.PRODUCTION_SERVER_DIR }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target }}" = "production" ]; then
            echo "deploy_target=production" >> "$GITHUB_OUTPUT"
            echo "deploy_env_name=production" >> "$GITHUB_OUTPUT"
            echo "deploy_env_url=https://naturaufeminin.fr" >> "$GITHUB_OUTPUT"
            echo "server_dir=${{ env.PRODUCTION_SERVER_DIR }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_target=parallel" >> "$GITHUB_OUTPUT"
            echo "deploy_env_name=parallel" >> "$GITHUB_OUTPUT"
            echo "deploy_env_url=https://naturaufeminin.fr" >> "$GITHUB_OUTPUT"
            echo "server_dir=${{ env.PARALLEL_SERVER_DIR }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_VERSION: ${{ secrets.SANITY_API_VERSION }}
          PUBLIC_CONTACT_FORM_ENDPOINT: ${{ secrets.PUBLIC_CONTACT_FORM_ENDPOINT }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ needs.build.outputs.deploy_env_name }}
      url: ${{ needs.build.outputs.deploy_env_url }}

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - name: Deploy target summary
        run: |
          echo "Target: ${{ needs.build.outputs.deploy_target }}"
          echo "Server directory: ${{ needs.build.outputs.server_dir }}"

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to O2Switch
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          SERVER_DIR: ${{ needs.build.outputs.server_dir }}
        run: |
          set -euo pipefail
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" -p \"$FTP_PORT\" \"$FTP_SERVER\";
            mirror -R --verbose --only-newer --parallel=2 ./dist/ \"$SERVER_DIR\";
            bye
          "
